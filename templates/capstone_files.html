<!DOCTYPE html>
<html>

<head>

    <title>Capstone Files</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</head>

<body class="bg-light" id="body">

    {% include "navbar.html" %}

    <div class="container mt-5">

        <h3 class="mb-4">{{ name }} Capstone Files</h3>

        <div class="card shadow">

            <div class="card-body">

                <table class="table table-bordered table-hover">

                    <thead class="table-light">

                        <tr>
                            <th>File Name</th>
                            <th>View</th>
                            <th>Download</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for f in files %}

                        <tr>
                            <td>{{ f.filename }}</td>

                            <td>
                                <a href="/capstone-view/{{ f.filename }}" class="btn btn-primary btn-sm"
                                    target="_blank">
                                    View
                                </a>
                            </td>

                            <td>
                                <a href="/capstone-download/{{ f.filename }}" class="btn btn-success btn-sm">
                                    Download
                                </a>
                            </td>
                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>

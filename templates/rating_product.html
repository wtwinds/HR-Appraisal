<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/rating.js') }}"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="bg-light" id="body">
    {% include "navbar.html" %}

    <div class="container mt-4">

        <div class="d-flex justify-content-between">
            <h4>Welcome, {{ session['user'] }}</h4>
        </div>

        <div class="card p-4 mt-4 shadow">

            <form method="POST">

                <label>Select Employee</label>
                <select name="employee" class="form-select mb-3">
                    {% for emp in employees %}
                    <option>{{ emp.name }}</option>
                    {% endfor %}
                </select>

                <label>Project Name</label>

                <select name="project" class="form-select mb-3">
                    {% for p in projects %}
                    <option>{{ p.projectName }}</option>
                    {% endfor %}
                </select>

                <label>Date</label>
                <input type="date" name="date" class="form-control mb-3" value="{{ today }}" required>

                <label>Ratings</label>

                <div class="mb-3">
                    {% for i in range(1,11) %}
                    <i class="bi bi-star-fill star fs-3" onclick="setRating({{ i }})" style="cursor:pointer;"></i>
                    {% endfor %}
                </div>


                <input type="hidden" name="rating" id="rating" required>

                <label>Add Comment</label>
                <textarea name="comment" class="form-control mb-3" placeholder="Write your feedback here..."
                    required></textarea>

                <button class="btn btn-primary">Submit</button>

            </form>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-success mt-3">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

    </div>

</body>

</html>
